<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERCP | Empire City RP</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  border-bottom: 2px solid #38bdf8;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #020617;
  border: 1px solid #38bdf8;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 6px;
  border: none;
}

button {
  padding: 10px;
  margin-top: 5px;
  border: none;
  border-radius: 6px;
  background: #38bdf8;
  cursor: pointer;
}

.badge {
  padding: 4px 8px;
  border-radius: 5px;
  font-size: 12px;
}

.pending { background: orange; color: black; }
.accepted { background: green; }
.denied { background: red; }
</style>
</head>

<body>

<header>
  <h1>ERCP | Empire City RP</h1>
  <p>Emergency Hamburg Roleplay Server</p>
</header>

<div class="container">

  <!-- APPLICATION -->
  <div class="card">
    <h2>Submit Application</h2>
    <input id="name" placeholder="Discord Username">
    <textarea id="reason" placeholder="Why do you want to join?"></textarea>
    <button onclick="submitApp()">Submit</button>
  </div>

  <!-- ADMIN -->
  <div class="card">
    <h2>Admin Login</h2>
    <input id="adminUser" placeholder="Username">
    <input id="adminPass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="status"></p>

    <div id="panel" style="display:none">
      <h3>Applications</h3>
      <div id="apps"></div>
    </div>
  </div>

</div>

<script>
// LOAD DATA
let applications = JSON.parse(localStorage.getItem("apps") || "[]");

// SUBMIT APPLICATION
function submitApp() {
  const name = document.getElementById("name").value;
  const reason = document.getElementById("reason").value;

  if (!name || !reason) {
    alert("Fill everything");
    return;
  }

  applications.push({
    id: Date.now(),
    name: name,
    reason: reason,
    status: "pending"
  });

  localStorage.setItem("apps", JSON.stringify(applications));

  document.getElementById("name").value = "";
  document.getElementById("reason").value = "";

  alert("Application submitted!");
}

// LOGIN
function login() {
  const user = document.getElementById("adminUser").value;
  const pass = document.getElementById("adminPass").value;

  if (user === "admin" && pass === "1234") {
    document.getElementById("status").innerText = "Logged in";
    document.getElementById("panel").style.display = "block";
    loadApps();
  } else {
    document.getElementById("status").innerText = "Wrong login";
  }
}

// LOAD APPLICATIONS
function loadApps() {
  const container = document.getElementById("apps");
  container.innerHTML = "";

  applications.forEach(app => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${app.name}</b>
      <p>${app.reason}</p>
      <span class="badge ${app.status}">${app.status}</span><br>
      <button onclick="updateStatus(${app.id}, 'accepted')">Accept</button>
      <button onclick="updateStatus(${app.id}, 'denied')">Deny</button>
    `;

    container.appendChild(div);
  });
}

// UPDATE STATUS
function updateStatus(id, status) {
  applications = applications.map(app => {
    if (app.id === id) app.status = status;
    return app;
  });

  localStorage.setItem("apps", JSON.stringify(applications));
  loadApps();
}

// LOAD ON START
window.onload = loadApps;
</script>

</body>
</html>
