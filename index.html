<!-- ===================== index.html ===================== -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERCP | Empire City RP</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
header{text-align:center;padding:20px;border-bottom:2px solid #38bdf8}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#020617;border:1px solid #38bdf8;padding:15px;border-radius:10px;margin:10px 0}
input,textarea{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:none}
button{padding:10px;margin:5px;border:none;border-radius:6px;background:#38bdf8;cursor:pointer}
a{color:#38bdf8}
</style>
</head>
<body>

<header>
<h1>ERCP | Empire City RP</h1>
<p>Emergency Hamburg Roleplay</p>
</header>

<div class="container">

<div class="card">
<h2>Apply to Join</h2>
<input id="name" placeholder="Discord Username">
<textarea id="reason" placeholder="Why do you want to join?"></textarea>
<button onclick="submitApp()">Submit</button>
</div>

<div class="card">
<h2>Admin Access</h2>
<input id="adminCode" placeholder="Admin Code">
<button onclick="loginAdmin()">Login</button>
<p id="msg"></p>
<a href="admin.html">Go to Admin Page</a>
</div>

</div>

<script>
let apps = JSON.parse(localStorage.getItem("apps")||"[]");

function submitApp(){
 if(!name.value||!reason.value) return alert("Fill all");

 apps.push({
  id:Date.now(),
  name:name.value,
  reason:reason.value,
  status:"pending"
 });

 localStorage.setItem("apps",JSON.stringify(apps));
 alert("Submitted");
 name.value="";
 reason.value="";
}

// SIMPLE ADMIN LOGIN (LOCAL ONLY)
function loginAdmin(){
 if(adminCode.value==="admin123"){
  localStorage.setItem("isAdmin","true");
  msg.innerText="Admin unlocked. Go to admin page.";
 } else {
  msg.innerText="Wrong code";
 }
}
</script>

</body>
</html>


</body>
</html>
