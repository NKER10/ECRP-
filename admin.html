<!-- ===================== admin.html ===================== -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERCP Admin</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
header{text-align:center;padding:20px;border-bottom:2px solid #38bdf8}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#020617;border:1px solid #38bdf8;padding:15px;border-radius:10px;margin:10px 0}
button{padding:10px;margin:5px;border:none;border-radius:6px;background:#38bdf8;cursor:pointer}
.badge{padding:4px 8px;border-radius:5px}
.pending{background:orange;color:black}
.accepted{background:green}
.denied{background:red}
</style>
</head>
<body>

<header>
<h1>ERCP Admin Dashboard</h1>
</header>

<div class="container">

<div id="panel"></div>

</div>

<script>
let apps = JSON.parse(localStorage.getItem("apps")||"[]");

// CHECK ADMIN ACCESS
if(localStorage.getItem("isAdmin")!="true"){
 document.body.innerHTML="<h2 style='text-align:center'>Access Denied</h2>";
}

function load(){
 const panel=document.getElementById("panel");
 panel.innerHTML="";

 apps.forEach(a=>{
  const div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
   <b>${a.name}</b>
   <p>${a.reason}</p>
   <span class="badge ${a.status}">${a.status}</span><br>
   <button onclick="update(${a.id},'accepted')">Accept</button>
   <button onclick="update(${a.id},'denied')">Deny</button>
  `;

  panel.appendChild(div);
 });
}

function update(id,status){
 apps=apps.map(a=>a.id===id?{...a,status}:a);
 localStorage.setItem("apps",JSON.stringify(apps));
 load();
}

load();
</script>

</body>
</html>
